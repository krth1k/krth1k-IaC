---
- name: Scrub ghost k3s installs
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Check for k3s binary
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Check for k3s uninstall script
      ansible.builtin.stat:
        path: /usr/local/bin/k3s-uninstall.sh
      register: k3s_uninstall_script

    - name: Force-remove ghost k3s artifacts
      when: k3s_binary.stat.exists and not k3s_uninstall_script.stat.exists
      block:
        - name: Stop k3s services if present
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: stopped
            enabled: false
          loop:
            - k3s
            - k3s-agent
          failed_when: false

        - name: Remove k3s binaries and scripts
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /usr/local/bin/k3s
            - /usr/local/bin/kubectl
            - /usr/local/bin/crictl
            - /usr/local/bin/ctr
            - /usr/local/bin/k3s-install.sh
            - /usr/local/bin/k3s-agent-uninstall.sh
            - /usr/local/bin/k3s-killall.sh
            - /etc/systemd/system/k3s.service
            - /etc/systemd/system/k3s-agent.service

        - name: Remove k3s state directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /etc/rancher
            - /var/lib/rancher
            - /var/lib/kubelet
            - /var/lib/cni
            - /run/k3s
            - /run/flannel

        - name: Reload systemd
          ansible.builtin.systemd:
            daemon_reload: true

- name: Reset k3s cluster
  ansible.builtin.import_playbook: k3s.orchestration.reset
