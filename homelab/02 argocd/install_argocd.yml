---
- name: Install ArgoCD on k3s cluster
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    argocd_namespace: argocd
    kubeconfig_path: "~/.kube/config"
    base_domain: "krth1k.dev"

  tasks:
    - name: Create ArgoCD namespace
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig {{ kubeconfig_path }} create namespace {{ argocd_namespace }}"
      register: ns_result
      changed_when: "'created' in ns_result.stdout"
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

    - name: Deploy ArgoCD using kubectl apply
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig {{ kubeconfig_path }} apply -n {{ argocd_namespace }} --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.6/manifests/install.yaml"
      register: apply_result
      changed_when: "'created' in apply_result.stdout or 'configured' in apply_result.stdout"

    - name: Wait for ArgoCD server deployment to be available
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig {{ kubeconfig_path }} -n {{ argocd_namespace }} rollout status deployment/argocd-server --timeout=150s"
      register: rollout_result
      changed_when: false

    - name: Configure ArgoCD server insecure mode
      ansible.builtin.shell:
        cmd: "kubectl --kubeconfig {{ kubeconfig_path }} apply -f -"
        stdin: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: argocd-cmd-params-cm
            namespace: {{ argocd_namespace }}
          data:
            server.insecure: "true"
      register: cm_result
      changed_when: "'created' in cm_result.stdout or 'configured' in cm_result.stdout"

    - name: Restart ArgoCD server to apply insecure mode
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig {{ kubeconfig_path }} -n {{ argocd_namespace }} rollout restart deployment/argocd-server"
      changed_when: true

    - name: Wait for ArgoCD server restart
      ansible.builtin.command:
        cmd: "kubectl --kubeconfig {{ kubeconfig_path }} -n {{ argocd_namespace }} rollout status deployment/argocd-server --timeout=150s"
      changed_when: false

    - name: Apply Ingress for ArgoCD server
      ansible.builtin.shell:
        cmd: "kubectl --kubeconfig {{ kubeconfig_path }} apply -f -"
        stdin: |
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: argocd-server
            namespace: {{ argocd_namespace }}
          spec:
            entryPoints:
              - web
            routes:
              - kind: Rule
                match: Host(`argocd.{{ base_domain }}`)
                priority: 10
                services:
                  - name: argocd-server
                    port: 80
              - kind: Rule
                match: Host(`argocd.{{ base_domain }}`) && Header(`Content-Type`, `application/grpc`)
                priority: 11
                services:
                  - name: argocd-server
                    port: 80
                    scheme: h2c
      register: ingress_result
      changed_when: "'created' in ingress_result.stdout or 'configured' in ingress_result.stdout"

    - name: Get ArgoCD admin password
      ansible.builtin.shell:
        cmd: "kubectl --kubeconfig {{ kubeconfig_path }} -n {{ argocd_namespace }} get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"
      register: admin_password
      changed_when: false
      failed_when: admin_password.rc != 0

    - name: Print ArgoCD server access information
      ansible.builtin.debug:
        msg: "ArgoCD server is accessible at https://argocd.{{ base_domain }} with username 'admin' and password '{{ admin_password.stdout }}' from 'argocd-initial-admin-secret' secret in '{{ argocd_namespace }}' namespace."